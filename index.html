<!DOCTYPE html>
<html>
<head>
<title>I'm Sorry ❤️</title>
<style>
body{
font-family:Arial;
background:linear-gradient(to right,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h1{color:#ff4d6d;}

button{
padding:12px 25px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h1>I'm Really Sorry ❤️</h1>

<p>
Hey my love,<br><br>
I never wanted to hurt you.  
You mean a lot to me and I truly value our relationship.<br><br>

Please forgive me. I promise to be better. ❤️
</p>

<button onclick="alert('Thank you for giving me another chance ❤️')">
Tap if you forgive me
</button>

</div>

</body>
</html>
